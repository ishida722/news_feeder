name: RSS翻訳メール配信

on:
  schedule:
    # 毎朝7時（JST）= UTC 22時（前日）
    - cron: '0 22 * * *'
  workflow_dispatch: # 手動実行ボタンも有効化

jobs:
  deliver:
    runs-on: ubuntu-latest
    permissions:
      actions: write   # Artifactsのアップロードに必要

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: uv をセットアップ
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 依存パッケージをインストール
        run: uv sync

      # 前回の既読DBをダウンロード（なければスキップ）
      - name: 既読DB（Artifact）をダウンロード
        uses: actions/download-artifact@v4
        with:
          name: rss-seen-db
          path: .
        continue-on-error: true  # 初回はArtifactがないのでエラーを無視

      - name: RSSスクリプトを実行
        env:
          DEEPL_API_KEY:       ${{ secrets.DEEPL_API_KEY }}
          GMAIL_ADDRESS:       ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD:  ${{ secrets.GMAIL_APP_PASSWORD }}
          TO_ADDRESS:          ${{ secrets.TO_ADDRESS }}
        run: uv run news-feeder

      # 実行後のDBをArtifactとして保存（90日間保持）
      - name: 既読DBをArtifactとしてアップロード
        uses: actions/upload-artifact@v4
        if: always()   # スクリプトが失敗しても保存する
        with:
          name: rss-seen-db
          path: rss_seen.db
          retention-days: 90
          overwrite: true
